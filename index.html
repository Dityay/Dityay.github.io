<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Butterscotch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <link id="main-css" rel="stylesheet" href="assets/css/style.css?v=17" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div id="app">
        <nav>
            <div class="nav-logo" onclick="navigateHome()">Butterscotch</div>
            <div class="nav-controls">
                <a href="https://t.me/dtyaa_ajh" target="_blank" class="btn-dl secondary nav-btn" style="text-decoration: none;">
                    Telegram
                </a>
            </div>
        </nav>

        <div id="announcement-banner" class="banner hidden">
            <div class="banner-content">
                <span class="banner-badge">Info</span>
                <div class="banner-info">
                    <div class="banner-text" id="banner-text">
                        <div id="announcement-text"></div>
                    </div>
                    <button class="expand-btn" id="expand-btn">View more</button>
                </div>
            </div>
            <button id="close-banner" class="close-btn" aria-label="Tutup Pengumuman">&times;</button>
        </div>

        <div id="page-home" class="page active">
            <div class="section-header" style="margin-top: 40px;">
                <div class="section-label" style="margin: 0; padding: 0;">
                    <span>Available ROMs</span>
                </div>
                <div class="filter-controls" id="home-device-filter-container"></div>
            </div>

            <div class="cards-grid" id="cards-container"></div>
        </div>

        <div id="page-detail" class="page">
            <div class="detail-container">
                <div class="back-btn" onclick="navigateHome()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Back
                </div>
                <div id="detail-content"></div>
            </div>
        </div>
    </div>

    <div id="md-modal" class="modal">
        <div class="modal-content glass">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div id="md-content"></div>
        </div>
    </div>

    <div id="reader-modal" class="modal">
        <div class="modal-content glass">
            <span class="close-modal" onclick="closeReaderModal()">&times;</span>
            <h2 id="reader-title" style="color: var(--accent); margin-bottom: 15px; font-family: 'Syne', sans-serif;">Loading...</h2>
            <div id="reader-content" style="line-height: 1.6;">
                <div style="text-align: center; color: var(--muted);">Loading content...</div>
            </div>
        </div>
    </div>

    <script src="assets/js/fog.js"></script>
    <script src="assets/js/earth.js"></script>
    <script src="assets/js/gale.js"></script>
    <script src="assets/js/script.js"></script>

</body>
</html>
